<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Outer ring (preferred evacuation zone) -->
  <circle cx="16" cy="16" r="14" fill="#FF8C00" fill-opacity="0.25" stroke="#FF8C00" stroke-width="1.5"/>
  <!-- Inner ring (mandatory evacuation zone) -->
  <circle cx="16" cy="16" r="8" fill="#CC0000" fill-opacity="0.35" stroke="#CC0000" stroke-width="1.5"/>
  <!-- Center point -->
  <circle cx="16" cy="16" r="2.5" fill="#CC0000"/>
  <!-- Warning symbol lines -->
  <line x1="16" y1="2" x2="16" y2="5" stroke="#CC0000" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="27" x2="16" y2="30" stroke="#CC0000" stroke-width="2" stroke-linecap="round"/>
  <line x1="2" y1="16" x2="5" y2="16" stroke="#CC0000" stroke-width="2" stroke-linecap="round"/>
  <line x1="27" y1="16" x2="30" y2="16" stroke="#CC0000" stroke-width="2" stroke-linecap="round"/>
</svg>
